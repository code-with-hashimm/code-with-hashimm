<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 320" width="490" height="320">
  <style>

    .card-bg { fill: #0d1117; stroke: #30363d; stroke-width: 1px; }
    .title-bar { fill: #161b22; }
    .dot-red { fill: #ff5f56; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #27c93f; }
    .title-text { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 12px; fill: #8b949e; font-weight: 600; }
    .key { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; fill: #58a6ff; font-weight: bold; }
    .value { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; fill: #c9d1d9; }
    .prompt { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; fill: #79c0ff; font-weight: bold; }
    
        @keyframes fadeInSlide {
          0% { opacity: 0; transform: translateY(8px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        .animated-row {
          opacity: 0;
          animation: fadeInSlide 0.4s ease-out forwards;
        }
        
  </style>
  <rect width="490" height="320" class="card-bg" rx="10"/>
  <path d="M 0 10 Q 0 0 10 0 L 480 0 Q 490 0 490 10 L 490 35 L 0 35 Z" class="title-bar"/>
  <circle cx="20" cy="18" r="5" class="dot-red"/>
  <circle cx="36" cy="18" r="5" class="dot-yellow"/>
  <circle cx="52" cy="18" r="5" class="dot-green"/>
  <text x="72" y="22" class="title-text">hashim@dev-box:~ (neofetch)</text>
  <g transform="translate(25, 0)">
    <g class="animated-row" style="animation-delay: 0.2s;">
      <text x="0" y="80" class="prompt">&#10095;</text>
      <text x="20" y="80" class="key">Now:</text>
      <text x="120" y="80" class="value">Building CampusKey Platform</text>
    </g>
    <g class="animated-row" style="animation-delay: 0.35s;">
      <text x="0" y="112" class="prompt">&#10095;</text>
      <text x="20" y="112" class="key">Prev:</text>
      <text x="120" y="112" class="value">Full-Stack Web Apps & UI/UX</text>
    </g>
    <g class="animated-row" style="animation-delay: 0.5s;">
      <text x="0" y="144" class="prompt">&#10095;</text>
      <text x="20" y="144" class="key">Stack:</text>
      <text x="120" y="144" class="value">Next.js, React, TypeScript, Tailwind</text>
    </g>
    <g class="animated-row" style="animation-delay: 0.65s;">
      <text x="0" y="176" class="prompt">&#10095;</text>
      <text x="20" y="176" class="key">Highlights:</text>
      <text x="120" y="176" class="value">AI Integration, Web Automation, Python</text>
    </g>
  </g>
</svg>